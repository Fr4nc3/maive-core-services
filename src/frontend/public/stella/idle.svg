<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Stella Astra idle placeholder">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="58" fill="url(#bg)"/>
  <g fill="#fde68a">
    <circle cx="22" cy="28" r="1.5">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="98" cy="40" r="1.2">
      <animate attributeName="opacity" values="1;0.2;1" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="92" r="1.0">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.0s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g transform="translate(60 64)">
    <polygon
      points="0,-26 7,-8 26,-8 11,4 17,22 0,12 -17,22 -11,4 -26,-8 -7,-8"
      fill="#fbbf24" stroke="#fde68a" stroke-width="1.5">
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="360" dur="18s" repeatCount="indefinite"/>
    </polygon>
    <circle cx="-4" cy="-2" r="1.6" fill="#1e293b"/>
    <circle cx="4" cy="-2" r="1.6" fill="#1e293b"/>
    <path d="M -4 4 Q 0 8 4 4" stroke="#1e293b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
