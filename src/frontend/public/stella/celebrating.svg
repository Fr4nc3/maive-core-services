<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Stella Astra celebrating placeholder">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="58" fill="url(#bg4)"/>
  <g transform="translate(60 64)">
